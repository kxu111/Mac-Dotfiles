source-file ~/.config/tmux/themes/vague/vague.conf

set -a terminal-features "tmux-256color:RGB"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default fg=default"
set -g status-left ""
set -g status-right " [ #S ] "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator " "
set -g window-status-style "fg=colour8 bg=default"
set -g window-status-current-style "fg=colour12 bg=default bold"

# tmux sessions
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/dotfiles"
bind C run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/nix"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/projects"
bind O run "~/.config/scripts/tmux-session-dispensary.sh ~/orgfiles"
bind M run "~/.config/scripts/tmux-session-dispensary.sh ~/Movies/good-videos"

# misc scripts
bind g run "~/.config/scripts/open-github.sh"
bind r send-keys "cd \"$(tmux display -p '#{pane_start_path}')\"" Enter

bind z source-file $HOME/.config/tmux/tmux.conf \; display-message "Config reloaded!"
